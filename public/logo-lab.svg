<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 52">
  <defs>
    <linearGradient id="iris2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004400"/>
      <stop offset="100%" style="stop-color:#006622"/>
    </linearGradient>
  </defs>

  <!-- Ícone olho (fundo branco semi-transparente) -->
  <rect x="0" y="4" width="44" height="44" rx="10" fill="rgba(255,255,255,0.15)"/>

  <!-- Olho -->
  <path d="M4 26 C9 15, 36 15, 40 26 C36 37, 9 37, 4 26 Z"
        fill="none" stroke="white" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Íris -->
  <circle cx="22" cy="26" r="7" fill="white"/>
  <circle cx="22" cy="26" r="5" fill="url(#iris2)"/>
  <circle cx="22" cy="26" r="2.8" fill="#001a00"/>
  <!-- Brilhos -->
  <circle cx="25" cy="22.5" r="1.6" fill="white" opacity="0.9"/>
  <circle cx="19" cy="29" r="0.7" fill="white" opacity="0.4"/>
  <!-- Nós de conexão -->
  <circle cx="5.5" cy="26" r="1.8" fill="white" opacity="0.8"/>
  <circle cx="38.5" cy="26" r="1.8" fill="white" opacity="0.8"/>
  <line x1="7.3" y1="26" x2="13" y2="26" stroke="white" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <line x1="31" y1="26" x2="36.7" y2="26" stroke="white" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>

  <!-- Texto: Conexão (branco) -->
  <text x="52" y="24"
        font-family="Montserrat, Arial, sans-serif"
        font-weight="700"
        font-size="16"
        fill="white"
        letter-spacing="-0.3">Conexão</text>

  <!-- Texto: ÓTICAS (branco com opacidade) -->
  <text x="53" y="39"
        font-family="Montserrat, Arial, sans-serif"
        font-weight="700"
        font-size="10.5"
        fill="white"
        opacity="0.75"
        letter-spacing="3.5">ÓTICAS</text>

  <!-- Badge LAB -->
  <rect x="138" y="28" width="30" height="13" rx="3" fill="rgba(255,255,255,0.2)"/>
  <text x="153" y="39"
        font-family="Montserrat, Arial, sans-serif"
        font-weight="700"
        font-size="8"
        fill="white"
        text-anchor="middle"
        letter-spacing="2">LAB</text>
</svg>
