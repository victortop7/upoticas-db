<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005500"/>
      <stop offset="100%" style="stop-color:#008833"/>
    </linearGradient>
    <linearGradient id="iris2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004400"/>
      <stop offset="100%" style="stop-color:#006622"/>
    </linearGradient>
  </defs>

  <!-- Ícone fundo -->
  <rect x="0" y="4" width="48" height="48" rx="11" fill="url(#bg2)"/>

  <!-- Olho -->
  <path d="M4 28 C9 17, 40 17, 44 28 C40 39, 9 39, 4 28 Z"
        fill="none" stroke="white" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Íris -->
  <circle cx="24" cy="28" r="7.5" fill="white"/>
  <circle cx="24" cy="28" r="5.5" fill="url(#iris2)"/>
  <circle cx="24" cy="28" r="3" fill="#001a00"/>

  <!-- Brilhos -->
  <circle cx="27" cy="24.5" r="1.8" fill="white" opacity="0.9"/>
  <circle cx="21" cy="31" r="0.8" fill="white" opacity="0.4"/>

  <!-- Nós de conexão -->
  <circle cx="6" cy="28" r="2" fill="white" opacity="0.85"/>
  <circle cx="42" cy="28" r="2" fill="white" opacity="0.85"/>
  <line x1="8" y1="28" x2="14" y2="28" stroke="white" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <line x1="34" y1="28" x2="40" y2="28" stroke="white" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>

  <!-- Texto: Conexão -->
  <text x="58" y="26"
        font-family="Montserrat, Arial, sans-serif"
        font-weight="700"
        font-size="17"
        fill="#1a1a1a"
        letter-spacing="-0.3">Conexão</text>

  <!-- Texto: ÓTICAS -->
  <text x="59" y="42"
        font-family="Montserrat, Arial, sans-serif"
        font-weight="700"
        font-size="11"
        fill="#005500"
        letter-spacing="3">ÓTICAS</text>

  <!-- Badge LAB -->
  <rect x="140" y="30" width="32" height="14" rx="4" fill="#005500"/>
  <text x="156" y="41"
        font-family="Montserrat, Arial, sans-serif"
        font-weight="700"
        font-size="8"
        fill="white"
        text-anchor="middle"
        letter-spacing="2">LAB</text>
</svg>
