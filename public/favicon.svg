<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Fundo quadrado arredondado vermelho -->
  <rect width="48" height="48" rx="10" fill="#cc0000"/>

  <!-- Forma de olho (arco superior e inferior) -->
  <path d="M6 24 C10 14, 38 14, 42 24 C38 34, 10 34, 6 24 Z"
        fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Íris -->
  <circle cx="24" cy="24" r="7" fill="white"/>

  <!-- Pupila -->
  <circle cx="24" cy="24" r="3.5" fill="#cc0000"/>

  <!-- Brilho -->
  <circle cx="27" cy="21" r="1.5" fill="white" opacity="0.8"/>
</svg>
